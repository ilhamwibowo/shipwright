[project]
name = "dev-agent"
version = "0.1.0"
description = "Multi-agent development pipeline for ChompChat"
requires-python = ">=3.12"
dependencies = [
    "claude-agent-sdk>=0.1.48",
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]

[project.scripts]
dev-agent = "dev_agent.main:main"
